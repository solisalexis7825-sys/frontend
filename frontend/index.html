<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galería Multimedia NoSQL</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <h1>🎵 Galería Multimedia NoSQL 🎵</h1>

  <form id="formulario" enctype="multipart/form-data">

    <h2>Agregar Multimedia</h2>

    <input
      type="text"
      name="titulo"
      placeholder="Título"
      required
    >

    <textarea
      name="descripcion"
      placeholder="Descripción"
    ></textarea>

    <label>📷 Imagen:</label>
    <input
      type="file"
      name="imagen"
      accept="image/*"
      required
    >

    <label>🎧 Audio:</label>
    <input
      type="file"
      name="audio"
      accept="audio/*"
      required
    >

    <button type="submit">
      Guardar Multimedia
    </button>

  </form>

  <h2>📚 Galería</h2>

  <div id="galeria"></div>

  <script src="app.js"></script>

</body>
</html>
